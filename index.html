<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой форум</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="forum">
    <h1>💬 Мой форум</h1>

    <p class="description">
      Напиши сообщение на стене форума.
    </p>

    <div class="form">
      <input id="nameInput" type="text" placeholder="Ваше имя">
      <textarea id="messageInput" placeholder="Напишите сообщение"></textarea>
      <button id="sendButton">Отправить</button>
    </div>

    <div id="messagesList" class="messages"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
